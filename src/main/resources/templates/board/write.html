<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>하이네트서비스 - 새 글 작성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">새 게시글 작성</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/board/write}" method="post">
                
                <div class="mb-3">
                    <label for="writer" class="form-label fw-bold">작성자</label>
                    <input type="text" id="writer" name="writer" class="form-line form-control" placeholder="이름을 입력하세요" required>
                </div>

                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">제목</label>
                    <input type="text" id="title" name="title" class="form-control" placeholder="제목을 입력하세요" required>
                </div>

                <div class="mb-3">
                    <label for="content" class="form-label fw-bold">내용</label>
                    <textarea id="content" name="content" class="form-control" rows="10" placeholder="내용을 입력하세요" required></textarea>
                </div>

                <div class="text-end pt-2 border-top">
                    <a th:href="@{/board/list}" class="btn btn-light border me-2">취소</a>
                    <button type="submit" class="btn btn-primary">저장하기</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
