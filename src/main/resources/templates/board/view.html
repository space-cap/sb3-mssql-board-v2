<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>하이네트서비스 - 게시글 보기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-white py-3">
            <h3 class="card-title mb-2" th:text="${board.title}">게시글 제목 예시</h3>
            <div class="text-muted small">
                <span>작성자: <strong th:text="${board.writer}">홍길동</strong></span>
                <span class="ms-3">작성일: <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-18 12:00</span></span>
                <span class="ms-3">조회수: <span th:text="${board.viewCnt}">0</span></span>
            </div>
        </div>
        <div class="card-body" style="min-height: 300px; white-space: pre-wrap;" th:text="${board.content}">
            게시글 본문 내용이 여기에 들어갑니다.
        </div>
        <div class="card-footer bg-white d-flex justify-content-between py-3">
            <a th:href="@{/board/list(page=${currentPage})}" class="btn btn-secondary">목록으로</a>
            <div>
                <button type="button" class="btn btn-warning me-1">수정</button>
                <button type="button" class="btn btn-danger">삭제</button>
            </div>
        </div>

        <div class="card-footer bg-light border-top-0 px-4 py-4">
    
    <h5 class="mb-3">댓글 (<span th:text="${board.comments.size()}">0</span>)</h5>
    
    <div th:if="${#lists.isEmpty(board.comments)}" class="text-muted small mb-4">
        첫 번째 댓글을 남겨보세요.
    </div>
    
    <div th:each="comment : ${board.comments}" class="bg-white p-3 rounded shadow-sm mb-2">
        <div class="d-flex justify-content-between mb-1">
            <strong class="text-primary" th:text="${comment.writer}">댓글작성자</strong>
            <span class="text-muted small" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-18 18:00</span>
        </div>
        <div style="white-space: pre-wrap;" th:text="${comment.content}">댓글 내용이 출력됩니다.</div>
    </div>

    <form th:action="@{/comment/write/{boardId}(boardId=${board.id})}" method="post" class="mt-4 border-top pt-4">
        <div class="row g-2">
            <div class="col-md-3">
                <input type="text" name="writer" class="form-control" placeholder="작성자 이름" required>
            </div>
            <div class="col-md-9">
                <div class="input-group">
                    <textarea name="content" class="form-control" rows="1" placeholder="댓글을 입력해 주세요." required></textarea>
                    <button class="btn btn-primary" type="submit">등록</button>
                </div>
            </div>
        </div>
    </form>
    
</div>

    </div>
</div>

</body>
</html>
