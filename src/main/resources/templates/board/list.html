<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">게시글 목록</h5>
            <a th:href="@{/board/write}" class="btn btn-sm btn-light fw-bold text-primary">글쓰기</a>
        </div>
        <div class="card-body">
            <table class="table table-hover text-center align-middle">
                <thead class="table-light">
                <tr>
                    <th style="width: 10%;">번호</th>
                    <th style="width: 50%;">제목</th>
                    <th style="width: 15%;">작성자</th>
                    <th style="width: 15%;">작성일</th>
                    <th style="width: 10%;">조회수</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(boards)}">
                    <td colspan="5" class="text-muted py-4">등록된 게시글이 없습니다.</td>
                </tr>
                <tr th:each="board : ${boards}">
                    <td th:text="${board.id}">1</td>
                    <td class="text-start">
                        <a th:href="@{/board/view/{id}(id=${board.id})}"
                           th:text="${board.title}"
                           class="text-decoration-none text-dark fw-semibold">
                            테스트 제목입니다
                        </a>
                    </td>
                    <td th:text="${board.writer}">관리자</td>
                    <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd')}">2026-05-18</td>
                    <td th:text="${board.viewCnt}">0</td>
                </tr>
                </tbody>
            </table>

            <nav aria-label="Page navigation" class="mt-4" th:if="${page.totalPages > 0}">
                <ul class="pagination justify-content-center">
                    
                    <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                        <a class="page-line page-link" th:href="@{/board/list(page=0)}">&laquo;</a>
                    </li>

                    <li class="page-item" th:classappend="${!page.hasPrevious()} ? 'disabled'">
                        <a class="page-link" th:href="@{/board/list(page=${page.number - 1})}">이전</a>
                    </li>

                    <li class="page-item" 
                        th:each="idx : ${#numbers.sequence(startPage, endPage)}" 
                        th:classappend="${idx == page.number + 1} ? 'active'">
                        <a class="page-link" th:href="@{/board/list(page=${idx - 1})}" th:text="${idx}">1</a>
                    </li>

                    <li class="page-item" th:classappend="${!page.hasNext()} ? 'disabled'">
                        <a class="page-link" th:href="@{/board/list(page=${page.number + 1})}">다음</a>
                    </li>

                    <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/board/list(page=${page.totalPages - 1})}">&raquo;</a>
                    </li>
                    
                </ul>
            </nav>
        </div>
    </div>
</div>

</body>
</html>
