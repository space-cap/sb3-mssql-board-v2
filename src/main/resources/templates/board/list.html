<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>하이네트서비스 - 게시판 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">통합 게시판 목록</h5>
            <a th:href="@{/board/write}" class="btn btn-sm btn-lightfw-bold text-primary">글쓰기</a>
        </div>
        <div class="card-body">
            <table class="table table-hover text-center">
                <thead class="table-light">
                <tr>
                    <th style="width: 10%;">번호</th>
                    <th style="width: 50%;">제목</th>
                    <th style="width: 15%;">작성자</th>
                    <th style="width: 15%;">작성일</th>
                    <th style="width: 10%;">조회수</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(boards)}">
                    <td colspan="5" class="text-muted py-4">등록된 게시글이 없습니다.</td>
                </tr>
                <tr th:each="board : ${boards}">
                    <td th:text="${board.id}">1</td>
                    <td class="text-start">
                        <a th:href="@{/board/view/{id}(id=${board.id})}" th:text="${board.title}" class="text-decoration-none text-dark fw-semibold">
                            테스트 제목입니다.
                        </a>
                    </td>
                    <td th:text="${board.writer}">관리자</td>
                    <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd')}">2026-05-18</td>
                    <td th:text="${board.viewCnt}">0</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
