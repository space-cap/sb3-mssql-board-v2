<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Hello World</title>
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: Arial, sans-serif;
			color: #172033;
			background: #f4f7fb;
		}

		main {
			width: min(92vw, 520px);
			padding: 40px;
			text-align: center;
			background: #ffffff;
			border: 1px solid #d8e0eb;
			border-radius: 8px;
			box-shadow: 0 16px 36px rgba(23, 32, 51, 0.08);
		}

		h1 {
			margin: 0;
			font-size: 44px;
			line-height: 1.15;
		}

		p {
			margin: 16px 0 0;
			font-size: 18px;
			color: #4d5d73;
		}
	</style>
</head>
<body>
	<main>
		<h1 th:text="${message}">Hello World</h1>
		<p>Spring Boot first page.</p>
	</main>
</body>
</html>
